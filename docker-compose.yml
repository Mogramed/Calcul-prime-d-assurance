services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: insurance_pricing
      POSTGRES_USER: insurance_pricing
      POSTGRES_PASSWORD: insurance_pricing
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurance_pricing -d insurance_pricing"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
    profiles: ["ops"]
    environment:
      INSURANCE_PRICING_DATABASE_URL: postgresql+psycopg://insurance_pricing:insurance_pricing@postgres:5432/insurance_pricing
      INSURANCE_PRICING_RUN_ID: ${INSURANCE_PRICING_RUN_ID}
      INSURANCE_PRICING_LOG_LEVEL: ${INSURANCE_PRICING_LOG_LEVEL:-INFO}
      INSURANCE_PRICING_LOG_JSON: ${INSURANCE_PRICING_LOG_JSON:-true}
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${INSURANCE_PRICING_ARTIFACTS_DIR:-./artifacts}:/app/artifacts:ro

  api:
    build:
      context: .
    environment:
      INSURANCE_PRICING_DATABASE_URL: postgresql+psycopg://insurance_pricing:insurance_pricing@postgres:5432/insurance_pricing
      INSURANCE_PRICING_RUN_ID: ${INSURANCE_PRICING_RUN_ID}
      INSURANCE_PRICING_LOG_LEVEL: ${INSURANCE_PRICING_LOG_LEVEL:-INFO}
      INSURANCE_PRICING_LOG_JSON: ${INSURANCE_PRICING_LOG_JSON:-true}
      INSURANCE_PRICING_CORS_ALLOWED_ORIGINS: ${INSURANCE_PRICING_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}
      INSURANCE_PRICING_ADMIN_EMAILS: ${INSURANCE_PRICING_ADMIN_EMAILS:-}
      INSURANCE_PRICING_SESSION_TTL_HOURS: ${INSURANCE_PRICING_SESSION_TTL_HOURS:-720}
      INSURANCE_PRICING_ROOT_PATH: ${INSURANCE_PRICING_ROOT_PATH:-}
      INSURANCE_PRICING_PUBLIC_WEB_URL: ${INSURANCE_PRICING_PUBLIC_WEB_URL:-}
      INSURANCE_PRICING_RESEND_API_KEY: ${INSURANCE_PRICING_RESEND_API_KEY:-}
      INSURANCE_PRICING_RESEND_SENDER_EMAIL: ${INSURANCE_PRICING_RESEND_SENDER_EMAIL:-}
      INSURANCE_PRICING_RESEND_SENDER_NAME: ${INSURANCE_PRICING_RESEND_SENDER_NAME:-Nova Assurances}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${INSURANCE_PRICING_ARTIFACTS_DIR:-./artifacts}:/app/artifacts:ro

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      API_AUDIENCE: ${API_AUDIENCE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
